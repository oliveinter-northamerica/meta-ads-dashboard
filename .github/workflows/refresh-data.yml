# Refreshes scripts/raw/*.json daily from the Meta Marketing API.
#
# SCOPE — this workflow ONLY updates the raw JSON inputs in scripts/raw/.
# It does NOT regenerate the password-protected dashboards on the live site
# (meta-amazon.html, meta-combined.html, meta-daily.html). Those are produced
# by a separate local pipeline that publishes encrypted HTML. To take this
# workflow further, port that local pipeline into scripts/ as well — the data
# layer is now in place to feed it.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   META_ACCESS_TOKEN   long-lived Meta token with ads_read on the target account
#   META_AD_ACCOUNT_ID  e.g. act_1354817955224233

name: refresh-data

on:
  schedule:
    # 06:00 KST = 21:00 UTC previous day. Adjust if you want a different cadence.
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Fetch fresh data from Meta
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
        run: python scripts/refresh_data.py

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/raw/campaigns.json scripts/raw/timeseries.json scripts/raw/placements.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            today=$(TZ=Asia/Seoul date +%F)
            git commit -m "chore(data): refresh raw Meta inputs ($today KST)"
            git push
          fi
