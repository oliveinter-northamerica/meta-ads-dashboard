<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta Ads Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .kpi-trend-up { color: #10b981; }
    .kpi-trend-down { color: #ef4444; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center text-white font-bold">M</div>
          <div>
            <h1 class="text-lg font-semibold" id="account-name">Meta Ads Dashboard</h1>
            <p class="text-xs text-slate-500" id="account-subtitle">Campaign performance overview</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <select id="date-range" class="text-sm border border-slate-200 rounded-md px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="7">Last 7 days</option>
            <option value="30" selected>Last 30 days</option>
            <option value="90">Last 90 days</option>
          </select>
          <button class="text-sm bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md font-medium">Export</button>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-8">
      <!-- KPI Cards -->
      <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4" id="kpi-cards"></section>

      <!-- Charts -->
      <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="bg-white border border-slate-200 rounded-xl p-6 lg:col-span-2">
          <div class="flex items-center justify-between mb-4">
            <div>
              <h2 class="text-sm font-semibold text-slate-900">Performance over time</h2>
              <p class="text-xs text-slate-500">Spend and clicks by day</p>
            </div>
            <div class="flex gap-2 text-xs">
              <span class="inline-flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-blue-600"></span>Spend</span>
              <span class="inline-flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-emerald-500"></span>Clicks</span>
            </div>
          </div>
          <canvas id="timeseries-chart" height="110"></canvas>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl p-6">
          <h2 class="text-sm font-semibold text-slate-900 mb-1">Spend by placement</h2>
          <p class="text-xs text-slate-500 mb-4">Share of total spend</p>
          <canvas id="placement-chart" height="180"></canvas>
        </div>
      </section>

      <!-- Campaign Table -->
      <section class="bg-white border border-slate-200 rounded-xl overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
          <div>
            <h2 class="text-sm font-semibold text-slate-900">Campaigns</h2>
            <p class="text-xs text-slate-500">Click column headers to sort</p>
          </div>
          <input type="text" id="campaign-search" placeholder="Search campaigns…" class="text-sm border border-slate-200 rounded-md px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-xs uppercase tracking-wide text-slate-500">
              <tr>
                <th class="text-left px-6 py-3 cursor-pointer" data-sort="name">Campaign</th>
                <th class="text-left px-4 py-3">Status</th>
                <th class="text-right px-4 py-3 cursor-pointer" data-sort="spend">Spend</th>
                <th class="text-right px-4 py-3 cursor-pointer" data-sort="impressions">Impressions</th>
                <th class="text-right px-4 py-3 cursor-pointer" data-sort="clicks">Clicks</th>
                <th class="text-right px-4 py-3 cursor-pointer" data-sort="ctr">CTR</th>
                <th class="text-right px-6 py-3 cursor-pointer" data-sort="cpc">CPC</th>
              </tr>
            </thead>
            <tbody id="campaign-tbody" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="./data.js"></script>
  <script src="./dashboard.js"></script>
</body>
</html>
